<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アップロードテスト</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 40px; max-width: 600px; }
  .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
  h2 { margin-top: 0; }
  button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  .result { margin-top: 10px; padding: 10px; background: #f1f5f9; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
<h1>アップロードテスト</h1>

<div class="section">
  <h2>① アポイントリスト（.xlsx）</h2>
  <input type="file" id="apo_file" accept=".xlsx"><br><br>
  <button onclick="uploadApo()">アップロード</button>
  <div class="result" id="apo_result">-</div>
</div>

<div class="section">
  <h2>② 生産性レポート（.csv）</h2>
  <input type="file" id="prod_file" accept=".csv"><br><br>
  <button onclick="uploadProd()">アップロード</button>
  <div class="result" id="prod_result">-</div>
</div>

<div class="section">
  <h2>③ jinjer勤怠データ（.csv）</h2>
  <input type="file" id="att_file" accept=".csv"><br><br>
  <button onclick="uploadAtt()">アップロード</button>
  <div class="result" id="att_result">-</div>
</div>

<script>
const BASE_URL = "https://digross-server.onrender.com";

// Renderウォームアップ
fetch(BASE_URL + "/health_staff").catch(() => {});

async function uploadApo() {
  const file = document.getElementById("apo_file").files[0];
  const result = document.getElementById("apo_result");
  if (!file) { result.textContent = "ファイルを選択してください"; return; }

  result.textContent = "変換中...";
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array", cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { raw: false, dateNF: "yyyy/mm/dd" });

    const records = rows.map(r => ({
      staff_id: String(r["社員番号"] || "").trim(),
      acquired_date: r["取得日"] ? formatDate(r["取得日"]) : null,
      amount: parseInt(String(r["案件金額"] || "0").replace(/,/g, "")) || 0,
      cancel_date: String(r["キャンセル受付日"] || "").trim() || null,
      fb_date: r["フィードバック受付日"] ? formatDate(r["フィードバック受付日"]) : null,
      fb_amount: parseInt(String(r["達成金額"] || "0").replace(/,/g, "")) || 0,
    })).filter(r => r.staff_id);

    result.textContent = "送信中...";
    const res = await fetch(BASE_URL + "/staff/upload/appointments_json", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ records })
    });
    const data = await res.json();
    result.textContent = JSON.stringify(data);
  } catch(e) {
    result.textContent = "エラー: " + e.message;
  }
}

async function uploadProd() {
  const file = document.getElementById("prod_file").files[0];
  const result = document.getElementById("prod_result");
  if (!file) { result.textContent = "ファイルを選択してください"; return; }

  result.textContent = "変換中...";
  try {
    const text = await file.text();
    const rows = parseCSV(text);

    const records = rows.map(r => ({
      staff_id: String(r["社員番号"] || "").trim(),
      call_date: r["日付"] ? formatDate(r["日付"]) : null,
      call_count: parseInt(r["コール件数"] || "0") || 0,
    })).filter(r => r.staff_id);

    result.textContent = "送信中...";
    const res = await fetch(BASE_URL + "/staff/upload/productivity_json", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ records })
    });
    const data = await res.json();
    result.textContent = JSON.stringify(data);
  } catch(e) {
    result.textContent = "エラー: " + e.message;
  }
}

async function uploadAtt() {
  const file = document.getElementById("att_file").files[0];
  const result = document.getElementById("att_result");
  if (!file) { result.textContent = "ファイルを選択してください"; return; }

  result.textContent = "変換中...";
  try {
    const text = await file.text();
    const rows = parseCSV(text);

    const records = rows.map(r => {
      const workTime = String(r["実労働時間"] || "00:00").trim();
      let workHours = 0;
      try {
        const [h, m] = workTime.split(":");
        workHours = Math.round((parseInt(h) + parseInt(m) / 60) * 1000) / 1000;
      } catch(e) {}

      return {
        staff_id: String(r["*従業員ID"] || "").trim(),
        work_date: r["*年月日"] ? formatDate(r["*年月日"]) : null,
        work_hours: workHours,
      };
    }).filter(r => r.staff_id);

    result.textContent = "送信中...";
    const res = await fetch(BASE_URL + "/staff/upload/attendance_json", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ records })
    });
    const data = await res.json();
    result.textContent = JSON.stringify(data);
  } catch(e) {
    result.textContent = "エラー: " + e.message;
  }
}

  if (!val) return null;
  const d = new Date(val);
  if (isNaN(d)) return String(val).trim();
  return d.toISOString().split("T")[0];
}
