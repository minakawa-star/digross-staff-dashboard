<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実績確認</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fdfaf7; color: #2a2622; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  .header { background: #fff; border-bottom: 1px solid #f0e4da; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-title { font-size: 16px; font-weight: 700; color: #2a2622; }
  .header-sub { font-size: 13px; color: #b08968; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn { background: transparent; border: 1px solid #f0e4da; color: #b08968; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .logout-btn:hover { border-color: #e8a87c; color: #2a2622; }

  select, input[type="month"] {
    background: #fff7f1; border: 1px solid #f0e4da; color: #2a2622;
    padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; outline: none;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* メインサマリー */
  .main-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 760px) { .main-grid { grid-template-columns: 1fr; } }

  .summary-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; }
  .summary-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 4px; }
  .summary-sub { font-size: 11px; color: #c9a07a; margin-bottom: 16px; }

  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table td { padding: 10px 0; border-bottom: 1px solid #f7eee5; font-size: 13px; }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table td:first-child { color: #8a7a6d; }
  .summary-table td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .plus { color: #d97a3f; }
  .minus { color: #d9534f; }
  .blue { color: #5a9cf8; }

  /* ドーナツカード */
  .gauge-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-card-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 16px; align-self: flex-start; }
  .donut-wrap { position: relative; width: 180px; height: 180px; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .donut-rate { font-size: 28px; font-weight: 800; }
  .donut-label { font-size: 11px; color: #c9a07a; margin-top: 2px; }
  .donut-status { margin-top: 16px; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status-achieve { background: #fdeee3; color: #d97a3f; }
  .status-maintain { background: #fff4e0; color: #cf9a3a; }
  .status-under { background: #fdecec; color: #d9534f; }

  /* KPIグリッド */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  @media (max-width: 760px) { .kpi-grid { grid-template-columns: 1fr; } }
  .kpi-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 18px 20px; }
  .kpi-label { font-size: 12px; color: #c9a07a; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 800; color: #2a2622; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 11px; color: #c9a07a; margin-top: 4px; }
  .kpi-green { color: #d97a3f; }
  .kpi-yellow { color: #cf9a3a; }
  .kpi-red { color: #d9534f; }

  /* バー */
  .bar-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .bar-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 16px; }
  .bar-wrap { position: relative; height: 10px; background: #f7eee5; border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
  .bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg,#f3c19c,#e8a87c); transition: width 0.6s ease; }
  .bar-milestone { position: absolute; top: -3px; height: 16px; width: 2px; background: #fff; }
  .bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: #c9a07a; }

  /* 出勤予定数入力 */
  .planned-input { width: 70px; padding: 8px; border: 1px solid #f5e6d8; border-radius: 8px; font-size: 18px; font-weight: 700; text-align: center; color: #2a2622; background: #fff7f1; }
  .planned-save-btn { background: #e8a87c; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .planned-save-btn:hover { background: #d97a3f; }
  .planned-save-btn:disabled { background: #f0e4da; color: #c9a07a; cursor: not-allowed; }

  .loading { text-align: center; padding: 60px; color: #c9a07a; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title" id="staff-name">読み込み中...</div>
      <div class="header-sub" id="staff-rank"></div>
    </div>
  </div>
  <div class="header-right">
    <input type="month" id="month-select" value="2026-06">
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="container">
  <div id="loading" class="loading">データを読み込み中...</div>
  <div id="content" style="display:none">

    <!-- メイン：内訳 + ドーナツ -->
    <div class="main-grid">
      <div class="summary-card">
        <div class="summary-title" id="summary-title">今月の実績</div>
        <div class="summary-sub" id="summary-sub"></div>
        <table class="summary-table" id="breakdown-body"></table>
      </div>

      <div class="gauge-card">
        <div class="gauge-card-title">達成率</div>
        <div class="donut-wrap">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="78" fill="none" stroke="#f7eee5" stroke-width="16"/>
            <circle id="donut-circle" cx="90" cy="90" r="78" fill="none" stroke="#e8a87c" stroke-width="16"
                    stroke-linecap="round" stroke-dasharray="490" stroke-dashoffset="490"
                    transform="rotate(-90 90 90)" style="transition: stroke-dashoffset 0.8s ease;"/>
          </svg>
          <div class="donut-center">
            <div class="donut-rate" id="donut-rate">-</div>
            <div class="donut-label" id="donut-sub">出勤 -日</div>
          </div>
        </div>
        <div class="donut-status" id="donut-status">-</div>
      </div>
    </div>

    <!-- KPI：達成まであと・時給 -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">達成まであと</div>
        <div class="kpi-value" id="kpi-remain">-</div>
        <div class="kpi-sub" id="kpi-remain-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">時給</div>
        <div class="kpi-value" id="info-wage">-</div>
        <div class="kpi-sub">本人ステータス基準</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="work-days-label">出勤日数</div>
        <div class="kpi-value" id="info-days">-</div>
        <div class="kpi-sub" id="work-days-sub">当月実績</div>
      </div>
    </div>

    <!-- 出勤予定数入力 -->
    <div class="kpi-grid" id="planned-grid" style="grid-template-columns: 1fr;">
      <div class="kpi-card" id="planned-card">
        <div class="kpi-label">今月の出勤予定数</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <input type="number" class="planned-input" id="planned-input" min="0" max="31">
          <span style="font-size:14px;color:#8a7a6d">日</span>
          <button class="planned-save-btn" id="planned-save-btn" onclick="savePlannedDays()">保存</button>
        </div>
        <div class="kpi-sub" id="planned-msg">この月の目標値は、ここで設定した出勤予定数を基準に計算されます</div>
      </div>
    </div>

    <!-- 目標バー -->
    <div class="bar-card">
      <div class="bar-title">目標達成状況</div>
      <div class="bar-wrap">
        <div class="bar-fill" id="bar-fill"></div>
        <div class="bar-milestone" id="bar-maintain"></div>
        <div class="bar-milestone" id="bar-achieve" style="left:100%"></div>
      </div>
      <div class="bar-labels">
        <span>¥0</span>
        <span id="bar-maintain-label">維持目標</span>
        <span id="bar-achieve-label">達成目標</span>
      </div>
    </div>

  </div>
</div>

<script>
const BASE_URL = "https://digross-server.onrender.com";

fetch(BASE_URL + "/health_staff").catch(() => {});

const token = localStorage.getItem("staff_token");
const storedStaffId = localStorage.getItem("staff_id");
const role = localStorage.getItem("staff_role");

if (!token) {
  window.location.href = "login.html";
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { staffId: p.get("id"), month: p.get("month") || new Date().toISOString().slice(0, 7) };
}

const { staffId, month } = getParams();

if (role !== "admin" && staffId !== storedStaffId) {
  window.location.href = `staff.html?id=${storedStaffId}&month=${month}`;
}

document.getElementById("month-select").value = month;

document.getElementById("month-select").addEventListener("change", e => {
  const url = new URL(window.location.href);
  url.searchParams.set("month", e.target.value);
  window.location.href = url.toString();
});

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

async function loadData() {
  if (!staffId) {
    document.getElementById("loading").textContent = "URLにスタッフIDが指定されていません";
    return;
  }
  try {
    const res = await fetch(`${BASE_URL}/staff/summary?month=${month}`);
    const data = await res.json();
    const staff = (data.data || []).find(d => d.staff_id === staffId);
    if (!staff) {
      document.getElementById("loading").textContent = "スタッフが見つかりません: " + staffId;
      return;
    }
    renderPage(staff);
  } catch(e) {
    document.getElementById("loading").textContent = "読み込みエラー: " + e.message;
  }
}

function renderPage(d) {
  document.getElementById("staff-name").textContent = d.name;
  document.getElementById("staff-rank").textContent = d.rank + " / " + d.site;
  document.title = d.name + " | 実績確認";

  const rate = d.achieve_rate ?? 0;
  const remain = d.target_achieve > 0 ? d.target_achieve - d.sales : null;

  // サマリーテーブル
  document.getElementById("summary-sub").textContent = `${month} 月の売上実績`;
  document.getElementById("breakdown-body").innerHTML = `
    <tr><td>売上合計</td><td>${fmt(d.sales)}</td></tr>
    <tr><td>アポ取得金額</td><td class="plus">${fmt(d.apo_amount)}</td></tr>
    <tr><td>キャンセル金額</td><td class="minus">${d.cxl_amount > 0 ? '▲' + fmt(d.cxl_amount) : '-'}</td></tr>
    <tr><td>FB金額</td><td class="blue">${d.fb_amount > 0 ? fmt(d.fb_amount) : '-'}</td></tr>
    <tr><td>達成目標</td><td>${d.target_achieve > 0 ? fmt(d.target_achieve) : '-'}</td></tr>
    <tr><td>維持目標</td><td>${d.target_maintain > 0 ? fmt(d.target_maintain) : '-'}</td></tr>
  `;

  // ドーナツ
  const circumference = 490;
  const pct = Math.min(rate, 150) / 150; // 150%でフル
  const offset = circumference * (1 - pct);
  const circle = document.getElementById("donut-circle");
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = rate >= 100 ? "#e8a87c" : rate >= 80 ? "#f0c987" : "#e89a9a";

  document.getElementById("donut-rate").textContent = d.achieve_rate != null ? d.achieve_rate + "%" : "-";
  document.getElementById("donut-rate").style.color = rate >= 100 ? "#d97a3f" : rate >= 80 ? "#cf9a3a" : "#d9534f";
  document.getElementById("donut-sub").textContent = `出勤 ${d.work_days}日`;

  const statusEl = document.getElementById("donut-status");
  if (rate >= 100) { statusEl.textContent = "達成"; statusEl.className = "donut-status status-achieve"; }
  else if (rate >= 80) { statusEl.textContent = "維持圏"; statusEl.className = "donut-status status-maintain"; }
  else { statusEl.textContent = "未達"; statusEl.className = "donut-status status-under"; }

  // KPI
  const remainEl = document.getElementById("kpi-remain");
  if (remain != null && remain > 0) {
    remainEl.textContent = fmt(remain);
    remainEl.className = "kpi-value kpi-red";
    document.getElementById("kpi-remain-sub").textContent = "達成目標まで";
  } else if (remain != null && remain <= 0) {
    remainEl.textContent = "達成！";
    remainEl.className = "kpi-value kpi-green";
    document.getElementById("kpi-remain-sub").textContent = fmt(Math.abs(remain)) + " 超過";
  } else {
    remainEl.textContent = "-";
    document.getElementById("kpi-remain-sub").textContent = "";
  }

  const wageEl = document.getElementById("info-wage");
  if (d.is_monthly) {
    wageEl.textContent = "月給制";
    wageEl.style.color = "#cf9a3a";
  } else {
    wageEl.textContent = d.hourly_wage > 0 ? "¥" + d.hourly_wage.toLocaleString() : "-";
  }

  // 出勤日数（実績）
  document.getElementById("info-days").textContent = d.work_days + "日";
  document.getElementById("work-days-sub").textContent = d.is_confirmed ? "確定済み（実績）" : "現時点の実績";

  // 出勤予定数入力欄
  const plannedCard = document.getElementById("planned-card");
  if (d.is_confirmed) {
    plannedCard.innerHTML = `
      <div class="kpi-label">出勤予定数（確定済）</div>
      <div class="kpi-value" style="color:#c9a07a">${d.planned_work_days}日</div>
      <div class="kpi-sub">この月は確定済みのため編集できません。目標値は実績出勤日数で計算されています。</div>
    `;
  } else {
    document.getElementById("planned-input").value = d.planned_work_days || "";
  }

  // 目標バー
  const maxVal = d.target_achieve > 0 ? d.target_achieve * 1.5 : d.sales * 1.5 || 1;
  const barWidth = Math.min((d.sales / maxVal) * 100, 100);
  document.getElementById("bar-fill").style.width = barWidth + "%";

  if (d.target_achieve > 0) {
    const maintainPos = Math.min((d.target_maintain / maxVal) * 100, 100);
    const achievePos = Math.min((d.target_achieve / maxVal) * 100, 100);
    document.getElementById("bar-maintain").style.left = maintainPos + "%";
    document.getElementById("bar-achieve").style.left = achievePos + "%";
    document.getElementById("bar-maintain-label").textContent = "維持 " + fmt(d.target_maintain);
    document.getElementById("bar-achieve-label").textContent = "達成 " + fmt(d.target_achieve);
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
}

async function savePlannedDays() {
  const val = document.getElementById("planned-input").value;
  const msg = document.getElementById("planned-msg");
  const btn = document.getElementById("planned-save-btn");
  if (val === "" || isNaN(val)) {
    msg.textContent = "数値を入力してください";
    msg.style.color = "#d9534f";
    return;
  }
  btn.disabled = true;
  try {
    const res = await fetch(`${BASE_URL}/staff/target`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ staff_id: staffId, month: month, planned_work_days: parseInt(val) })
    });
    const data = await res.json();
    if (data.error) {
      msg.textContent = data.error;
      msg.style.color = "#d9534f";
    } else {
      msg.textContent = "保存しました（再読み込みで目標値が更新されます）";
      msg.style.color = "#2eb872";
    }
  } catch(e) {
    msg.textContent = "通信エラー";
    msg.style.color = "#d9534f";
  } finally {
    btn.disabled = false;
  }
}

function fmt(n) {
  if (n == null || n === 0) return "¥0";
  return "¥" + n.toLocaleString();
}

loadData();
</script>
</body>
</html>
